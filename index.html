<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica San Bartolomé - Orientación al Paciente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-dark: #1E1B4B;
            --bg-slate: #F8FAFC;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --emerald: #10B981;
            --rose: #F43F5E;
            --blue: #3B82F6;
            --radius-3xl: 24px;
            --radius-xl: 16px;
            --shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-slate);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Progress Bar */
        #progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: rgba(79, 70, 229, 0.1);
            z-index: 2000;
            display: none;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: var(--primary);
            transition: width 0.1s linear;
        }

        /* Navbar */
        header {
            background: #ffffff;
            padding: 0.75rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            z-index: 1000;
        }

        /* Dropdown Filter */
        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        #specialty-filter, #date-filter {
            padding: 10px 15px;
            border-radius: 12px;
            border: 2px solid #E2E8F0;
            background: #ffffff;
            font-family: 'Inter';
            font-weight: 700;
            color: var(--primary-dark);
            outline: none;
            cursor: pointer;
            font-size: 0.85rem;
        }
        #specialty-filter { min-width: 220px; }
        #date-filter { color: var(--primary); min-width: 150px; }

        /* Compact 2-Line Title */
        .title-container {
            text-align: right;
            line-height: 1;
        }
        .clinic-title-top {
            font-weight: 900;
            font-style: italic;
            color: var(--primary-dark);
            font-size: 1.1rem;
            text-transform: uppercase;
        }
        .clinic-title-bottom {
            font-weight: 900;
            font-style: italic;
            color: var(--primary-dark);
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Sub-Header (Subtitle Area) */
        .sub-header {
            padding: 1rem 5% 0.5rem;
            text-align: center;
            display: flex;
            justify-content: center;
        }
        .program-date {
            font-weight: 700;
            color: var(--primary);
            font-size: 1.1rem;
            background: #EEF2FF;
            padding: 6px 20px;
            border-radius: 50px;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 0.75rem;
            background: #F1F5F9;
            padding: 6px;
            border-radius: var(--radius-xl);
        }
        .mode-btn {
            border: none;
            background: transparent;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.75rem;
        }
        .mode-btn.active {
            background: #ffffff;
            color: var(--primary);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        /* Content Grid */
        main { flex: 1; padding: 0 5% 4rem; position: relative; }
        
        #cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 2rem;
            animation: fadeIn 0.8s ease-out;
        }

        /* Multi-column Scroll Container */
        #scroll-container {
            height: calc(100vh - 350px);
            overflow: hidden;
            position: relative;
            display: none;
        }
        #scroll-container::before, #scroll-container::after {
            content: "";
            position: absolute;
            left: 0; width: 100%; height: 100px;
            z-index: 10; pointer-events: none;
        }
        #scroll-container::before { top: 0; background: linear-gradient(to bottom, var(--bg-slate), transparent); }
        #scroll-container::after { bottom: 0; background: linear-gradient(to top, var(--bg-slate), transparent); }

        .scrolling-content {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            animation: scrollUp 40s linear infinite;
        }

        @keyframes scrollUp {
            from { transform: translateY(0); }
            to { transform: translateY(-50%); }
        }

        /* Card Styling */
        .card {
            background: #ffffff;
            border-radius: var(--radius-3xl);
            padding: 2rem;
            box-shadow: var(--shadow);
            border-top: 10px solid var(--primary);
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }
        .card-service {
            font-size: 1.25rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .card-doctor {
            font-size: 1.25rem;
            font-weight: 900;
            color: var(--primary-dark);
            line-height: 1.2;
        }
        .info-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.8rem 1rem;
            background: #F8FAFC;
            border-radius: var(--radius-xl);
            font-weight: 700;
            font-size: 0.95rem;
        }
        .info-row svg { width: 18px; height: 18px; color: var(--primary); }

        /* 4K / Large Screens */
        @media (min-width: 2500px) {
            #cards-grid { grid-template-columns: repeat(4, 1fr); }
            .scrolling-content { grid-template-columns: repeat(4, 1fr); }
            .clinic-name { font-size: 4.5rem; }
            .card-service, .card-doctor { font-size: 1.75rem; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden { display: none !important; }
    </style>
</head>

        <div class="controls">

            <button class="mode-btn" onclick="setMode('scroll')">Deslizante</button>

        <div class="title-container">

            <div class="clinic-title-bottom">BARTOLOM&Eacute;</div>

    <div class="sub-header">

    <main id="main-content">
        <div id="cards-grid"></div>

        <div id="scroll-container">
            <div id="scrolling-content-inner" class="scrolling-content"></div>
        </div>
    </main>

L","FECHA":"25/03/2026","HORA_INI":"09:00","HORA_FIN":"14:00","CANT_HORAS":5,"CANT_CUPOS":15,"CONSULTORIO":"CONSULTORIO 304"},{"PERIODO":"202603","SERVICIO":"UROLOGIA","MEDICO":"FERNANDEZ ALVAREZ FERNANDO RAFAEL","FECHA":"25/03/2026","HORA_INI":"15:00","HORA_FIN":"20:00","CANT_HORAS":5,"CANT_CUPOS":15,"CONSULTORIO":"CONSULTORIO 304"},{"PERIODO":"202603","SERVICIO":"UROLOGIA","MEDICO":"FERNANDEZ ALVAREZ FERNANDO RAFAEL","FECHA":"26/03/2026","HORA_INI":"08:00","HORA_FIN":"10:00","CANT_HORAS":2,"CANT_CUPOS":6,"CONSULTORIO":"PROCEDIMIENTOS 2"},{"PERIODO":"202603","SERVICIO":"UROLOGIA","MEDICO":"FERNANDEZ ALVAREZ FERNANDO RAFAEL","FECHA":"26/03/2026","HORA_INI":"10:00","HORA_FIN":"13:00","CANT_HORAS":3,"CANT_CUPOS":9,"CONSULTORIO":"CONSULTORIO 304"},{"PERIODO":"202603","SERVICIO":"UROLOGIA","MEDICO":"FERNANDEZ ALVAREZ FERNANDO RAFAEL","FECHA":"31/03/2026","HORA_INI":"09:00","HORA_FIN":"14:00","CANT_HORAS":5,"CANT_CUPOS":15,"CONSULTORIO":"CONSULTORIO 304"},{"PERIODO":"202603","SERVICIO":"UROLOGIA","MEDICO":"FERNANDEZ ALVAREZ FERNANDO RAFAEL","FECHA":"31/03/2026","HORA_INI":"14:00","HORA_FIN":"20:00","CANT_HORAS":6,"CANT_CUPOS":18,"CONSULTORIO":"CONSULTORIO 304"},{"PERIODO":"202604","SERVICIO":"UROLOGIA","MEDICO":"FERNANDEZ ALVAREZ FERNANDO RAFAEL","FECHA":"01/04/2026","HORA_INI":"08:00","HORA_FIN":"10:00","CANT_HORAS":2,"CANT_CUPOS":6,"CONSULTORIO":"PROCEDIMIENTOS 2"},{"PERIODO":"202604","SERVICIO":"UROLOGIA","MEDICO":"FERNANDEZ ALVAREZ FERNANDO RAFAEL","FECHA":"01/04/2026","HORA_INI":"10:00","HORA_FIN":"13:00","CANT_HORAS":3,"CANT_CUPOS":9,"CONSULTORIO":"CONSULTORIO 304"}];

        const serviceColors = {
            'CARDIOLOGIA': '#3B82F6', 'GINECOLOGIA': '#F43F5E', 'PEDIATRIA': '#10B981',
            'MEDICINA INTERNA': '#4F46E5', 'GASTROENTEROLOGIA': '#B45309', 'TRAUMATOLOGIA': '#0891B2',
            'DERMATOLOGIA': '#8B5CF6', 'ENDOCRINOLOGIA': '#EC4899', 'NEUROLOGIA': '#6366F1',
            'CIRUGIA GENERAL': '#10B981', 'DEFAULT': '#4F46E5'
        };

        const cleanData = scheduleData.map(item => ({
            service: item.SERVICIO, doctor: item.MEDICO, 
            time: `${item.HORA_INI} - ${item.HORA_FIN}`, 
            office: item.CONSULTORIO, date: item.FECHA,
            color: serviceColors[item.SERVICIO] || serviceColors.DEFAULT
        }));

        let currentMode = 'manual', currentFilter = 'TODAS', selectedDate = '';
        let cycleInterval = null, cycleProgressInterval = null;

        const icons = {
            clock: `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>`,
            pin: `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>`
        };

        function init() {
            populateDateSelector();
            const today = getTodayFormatted();
            const dateSelector = document.getElementById('date-filter');
            
            // Si el día de hoy existe en los datos, lo seleccionamos
            const hasToday = Array.from(dateSelector.options).some(opt => opt.value === today);
            if (hasToday) {
                dateSelector.value = today;
            } else if (dateSelector.options.length > 0) {
                // Fallback a la primera fecha disponible si hoy no hay programación
                dateSelector.value = dateSelector.options[0].value;
            }
            
            handleDateChange(dateSelector.value);
            setMode('manual');
        }

        function populateDateSelector() {
            const selector = document.getElementById('date-filter');
            // Obtener fechas únicas del dataset
            const uniqueDates = [...new Set(scheduleData.map(item => item.FECHA))];
            
            // Ordenar fechas (las fechas vienen en DD/MM/YYYY)
            uniqueDates.sort((a, b) => {
                const [da, ma, ya] = a.split('/').map(Number);
                const [db, mb, yb] = b.split('/').map(Number);
                return new Date(ya, ma-1, da) - new Date(yb, mb-1, db);
            });

            let options = '';
            uniqueDates.forEach(date => {
                const [d, m, y] = date.split('/');
                const dateObj = new Date(y, m-1, d);
                const label = dateObj.toLocaleDateString('es-ES', { day: '2-digit', month: 'long' }).toUpperCase();
                options += `<option value="${date}">${label}</option>`;
            });
            selector.innerHTML = options;
        }

        function getTodayFormatted() {
            const now = new Date();
            const d = String(now.getDate()).padStart(2, '0');
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const y = now.getFullYear();
            return `${d}/${m}/${y}`;
        }

        function handleDateChange(val) {
            selectedDate = val;
            updateDateDisplay();
            updateDropdown();
            applyFilter('TODAS');
        }

        function updateDateDisplay() {
            const [d, m, y] = selectedDate.split('/');
            const dateObj = new Date(y, m - 1, d);
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            const formatted = dateObj.toLocaleDateString('es-ES', options).toUpperCase();
            document.getElementById('current-date-display').textContent = "PROGRAMACI\u00D3N: " + formatted;
        }

        function getFilteredData() {
            return cleanData.filter(item => item.date === selectedDate);
        }

        function updateDropdown() {
            const select = document.getElementById('specialty-filter');
            const dailyData = getFilteredData();
            const specialties = [...new Set(dailyData.map(item => item.service))].sort();
            
            let options = '<option value="TODAS">TODAS LAS ESPECIALIDADES</option>';
            specialties.forEach(s => {
                options += `<option value="${s}" ${currentFilter === s ? 'selected' : ''}>${s}</option>`;
            });
            select.innerHTML = options;
        }

        function createCardHTML(item) {
            return `
                <div class="card" style="border-top-color: ${item.color}">
                    <div class="card-service" style="color: ${item.color}">${item.service}</div>
                    <div class="card-doctor">${item.doctor}</div>
                    <div class="card-info">
                        <div class="info-row">${icons.clock}<span>${item.time}</span></div>
                        <div class="info-row">${icons.pin}<span>${item.office}</span></div>
                    </div>
                </div>
            `;
        }

        function renderCards() {
            const grid = document.getElementById('cards-grid');
            const dailyData = getFilteredData();
            const filtered = currentFilter === 'TODAS' ? dailyData : dailyData.filter(i => i.service === currentFilter);
            
            if (filtered.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--text-muted); font-weight: 700;">NO HAY PROGRAMACI\u00D3N PARA ESTA FECHA</div>`;
                return;
            }
            grid.innerHTML = filtered.map(item => createCardHTML(item)).join('');
        }

        function applyFilter(specialty) {
            currentFilter = specialty;
            document.getElementById('specialty-filter').value = specialty;
            renderCards();
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                const text = btn.textContent.toLowerCase();
                btn.classList.toggle('active', (mode === 'manual' && text.includes('manual')) || (mode === 'cycle' && text.includes('ciclo')) || (mode === 'scroll' && text.includes('deslizante')));
            });

            clearInterval(cycleInterval);
            clearInterval(cycleProgressInterval);
            document.getElementById('progress-container').style.display = 'none';

            const grid = document.getElementById('cards-grid');
            const scroll = document.getElementById('scroll-container');
            
            grid.classList.add('hidden');
            scroll.style.display = 'none';

            if (mode === 'manual') {
                grid.classList.remove('hidden');
                applyFilter('TODAS');
            } else if (mode === 'cycle') {
                grid.classList.remove('hidden');
                document.getElementById('progress-container').style.display = 'block';
                startCycleMode();
            } else if (mode === 'scroll') {
                scroll.style.display = 'block';
                startScrollMode();
            }
        }

        function startCycleMode() {
            const dailyData = getFilteredData();
            const specialties = [...new Set(dailyData.map(item => item.service))];
            if (specialties.length === 0) { applyFilter('TODAS'); return; }
            let index = 0;
            const next = () => {
                applyFilter(specialties[index]);
                index = (index + 1) % specialties.length;
                startProgressBar();
            };
            next();
            cycleInterval = setInterval(next, 10000);
        }

        function startProgressBar() {
            const bar = document.getElementById('progress-bar');
            let width = 0;
            clearInterval(cycleProgressInterval);
            bar.style.width = '0%';
            cycleProgressInterval = setInterval(() => { width += 1; bar.style.width = width + '%'; if (width >= 100) clearInterval(cycleProgressInterval); }, 100);
        }

        function startScrollMode() {
            const container = document.getElementById('scrolling-content-inner');
            const dailyData = getFilteredData();
            if (dailyData.length === 0) {
                container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--text-muted); font-weight: 700;">NO HAY PROGRAMACI\u00D3N PARA ESTA FECHA</div>`;
                return;
            }
            const content = dailyData.map(item => createCardHTML(item)).join('');
            container.innerHTML = content + content; // Duplicar para scroll infinito
            
            // Ajustar duración basado en cantidad de datos (40-60s un ciclo)
            const duration = Math.max(40, Math.ceil(dailyData.length / 3) * 5);
            container.style.animationDuration = duration + 's';
        }

        init();
    </script>
